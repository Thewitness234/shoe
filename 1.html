<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - 1.html</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f9;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .image-box {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ccc;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Image Gallery (1.html)</h1>
    <p>Put your images inside the folder and link them below 📁</p>
</header>

<div class="container">

    <div class="image-box">
        <img src="2.jpeg" alt="Image 1">
    </div>

    <div class="image-box">
        <img src="1.jpg" alt="Image 2">
    </div>

    <div class="image-box">
        <img src="1.jpg" alt="Image 3">
    </div>

    <div class="image-box">
        <img src="1.jpg" alt="Image 4">
    </div>

    <div class="image-box">
        <img src="1.jpg" alt="Image 5">
    </div>

    <div class="image-box">
        <img src="1.jpg" alt="Image 6">
    </div>

</div>

<footer>
    <p>Folder structure: /images + this file = clean gallery flow ✨</p>
</footer>

</body>
</html>
